<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="style.css" />
    <script type="module" defer>
      import { polyfillCountryFlagEmojis } from "https://cdn.skypack.dev/country-flag-emoji-polyfill";
      polyfillCountryFlagEmojis();
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-1970-2030.js"></script>
    <title>Project World Clock</title>
  </head>
  <body>
    <div class="container">
      <h1>World Clock</h1>
      <select>
        <option value="">Select a City</option>
        <option value="">London</option>
        <option value="">New York</option>
        <option value="">Aukland</option>
      </select>

      <div class="city" id="city-one">
        <div>
          <h2>Los Angeles 🇺🇸</h2>
          <div class="date">29th March 2026</div>
        </div>
        <div class="time">11:10:26 <small>PM</small></div>
      </div>
      <div class="city" id="city-two">
        <div>
          <h2>Sydney 🇦🇺</h2>
          <div class="date">29th March 2026</div>
        </div>
        <div class="time">11:10:26 <small>PM</small></div>
      </div>
      <div class="city" id="city-three">
        <div>
          <h2>Paris 🇫🇷</h2>
          <div class="date">29th March 2026</div>
        </div>
        <div class="time">11:10:26 <small>PM</small></div>
      </div>
    </div>
    <footer>
      Coded by
      <a href="https://github.com/carey-ui" target="_blank">Carey Faherty</a>,
      is on
      <a href="https://github.com/carey-ui/aimsir_app_shecodes" target="_blank"
        >GitHub</a
      >
      and hosted on
      <a href="https://cf-projectworldclock.netlify.app/" target="_blank"
        >Netlify</a
      >
    </footer>
    <script src="script.js"></script>
  </body>
</html>
